name: Feature request
description: Suggest a new component or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem you're trying to solve before describing the solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. What does the current API make hard or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? An API sketch or pseudo-code is welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried other approaches? Why didn't they work?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to similar components in other libraries, prior discussion, etc.
    validations:
      required: false
