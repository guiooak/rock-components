name: Bug report
description: Report a bug in stud-components
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. A minimal reproduction is the single most helpful thing you can provide.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I do X, I expect Y, but instead Z happens.
    validations:
      required: true

  - type: input
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A link to a CodeSandbox, StackBlitz, or GitHub repo that reproduces the issue.
      placeholder: https://codesandbox.io/...
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Render `<StudProvider>` with ...
        2. Click ...
        3. Observe ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: stud-components version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: 19.0.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, browser, OS.
      placeholder: Node 22, Chrome 130, macOS 15
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, error stack traces, etc.
    validations:
      required: false
